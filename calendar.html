<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>カレンダーアプリ</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      max-width: 400px;
      margin: 20px auto;
      gap: 5px;
    }

    .day {
      border: 1px solid #ccc;
      padding: 10px;
      cursor: pointer;
    }

    .note {
      font-size: 12px;
      color: blue;
    }
  </style>
</head>

<body>

<h1>シンプルカレンダー</h1>

<h2 id="month"></h2>

<div class="grid" id="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("month");

const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();

const firstDay = new Date(year, month, 1).getDate();
const daysInMonth = new Date(year, month + 1, 0).getDate();

monthTitle.innerText = `${year}年 ${month + 1}月`;

let notes = JSON.parse(localStorage.getItem("notes")) || {};

function saveNotes() {
  localStorage.setItem("notes", JSON.stringify(notes));
}

for (let i = 1; i <= daysInMonth; i++) {
  const div = document.createElement("div");
  div.className = "day";

  div.innerHTML = `<div>${i}</div>`;

  if (notes[i]) {
    const note = document.createElement("div");
    note.className = "note";
    note.innerText = notes[i];
    div.appendChild(note);
  }

  div.onclick = function () {
    const text = prompt("メモを入力してください");
    if (text) {
      notes[i] = text;
      saveNotes();
      location.reload();
    }
  };

  calendar.appendChild(div);
}
</script>

</body>
</html>
